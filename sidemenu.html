<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SideMenu</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'poppins', sans-serif;
        }
        body{
            background: #f2f2f2;           
        }
        .side{
            height: 100%;
            width: 180px;
            position: absolute;
            background: #fff;
            transition: 0.5s ease;
            transform: translateX(-180px);

        }
        h1{
            color: #8000ff;
            font-weight: 800;
            text-align: right;
            padding: 10px;
            padding-right: 30px;
            pointer-events: none;
        }
        ul{     
            padding-left: 20px;
        }
        ul li{
            list-style-type: none;
        }
        ul li a{
            text-decoration: none;
            color: #011a41;
            font-weight: 500;
            padding: 5px 0;
            display: block;
            text-transform: capitalize;
            transition: 0.2s ease-out;
        }
        ul li:hover a{
            color: #fff;
            background: #8000ff;
        }
        input{
            visibility: hidden;
            display: none;
        }
        .toggle{
            position: absolute;
            height: 30px;
            width: 30px;
            background-color: #fff;
            z-index: 1;
            cursor: pointer;
            border-radius: 2px;
            top: 20px;
            left: 15px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.3);
        }
        .toggle .common{
            position: absolute;
            height: 2px;
            width: 20px;
            background: #8000ff;
            border-radius: 50px;
            transition: 0.3s ease;

        }
        .toggle .top_line{
            top: 30%;
            left: 50%;
            transform: translate(-50%,-50%);
        }
        .toggle .middle_line{
            top: 50%;
            left: 60%;

            transform: translate(-50%,-50%);
        }
        .toggle .bottom_line{
            top: 70%;
            left: 50%;
            transform: translate(-50%,-50%);
        }
        input:checked ~ .toggle .top_line{
            left: 2px;
            top: 14px;
            width: 25px;
            transform: rotate(45deg);
        }
        input:checked ~ .toggle .bottom_line{
            left: 2px;
            top: 14px;
            width: 25px;
            transform: rotate(-45deg);
        }
        input:checked ~ .toggle .middle_line{
            opacity: 0;
            width: 25px;
            transform: translate(20px);
        }
        input:checked ~ .side{
            transform: translateX(0px);
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);

        }
    </style>
</head>
<body>
    <label>
        <input type="checkbox">
        <div class="toggle">
            <span class="top_line common"></span>
            <span class="middle_line common"></span>
            <span class="bottom_line common"></span>
        </div>
        <div class="side">
            <h1>Menu</h1>
            <ul>
                <li><a href="#">Dashboard</a></li>
                <li><a href="#">Profile</a></li>
                <li><a href="#">Trending</a></li>
                <li><a href="#">Messages</a></li>
                <li><a href="#">Manager</a></li>
                <li><a href="#">portfolio</a></li>
                <li><a href="#">Saved</a></li>
                <li><a href="#">Settings</a></li>
            </ul>
        </div>
    </label>
    
</body>
</html>
